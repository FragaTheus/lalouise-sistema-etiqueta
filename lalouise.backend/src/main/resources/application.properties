spring.application.name=lalouise.backend

api.security.token.secret=${JWT_SECRET_KEY}

# PostgreSQL (produÁ„o)
#spring.datasource.url=jdbc:postgresql://db:5432/lalouisedb
#spring.datasource.driverClassName=org.postgresql.Driver
#spring.datasource.username=${DB_USER}
#spring.datasource.password=${DB_PASSWORD}

# H2 (desenvolvimento)

spring.datasource.url=jdbc:h2:mem:lalouisedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.defer-datasource-initialization=true

spring.rabbitmq.addresses=${RABBIT_ADRESS}
spring.rabbitmq.dynamic=true

server.port=${PORT:8080}